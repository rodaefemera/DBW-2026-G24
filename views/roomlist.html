<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="../public/css/ourStyle.css" rel="stylesheet">
    <title>MATRIOSCA</title>
</head>
<body>

    <div class="container">
            <!-- Header -->
            <header>
                <div class="top">
                    <a href="index.html" class="bigword">MATRIOSCA</a>
                    <a href="login.html" class="authentication">Log In</a>
                    <a href="signup.html" class="authentication">Sign up</a>
                </div>
                <nav class="navegacao">
                    <a href="profile.html">Profile</a>
                    <a href="friends.html">Friends</a>
                    <a href="roomlist.html">Rooms</a>
                    <a href="leaderboards.html">Leaderboard</a>
                    <a href="feedback.html">Feedback</a>
                </nav>
            </header>

            <!-- Center -->
            <main class="page-main whitebg" style="text-align: center; padding-top: 40px; padding-bottom: 40px;">
                <h3 style="margin-top: 0;">Rooms</h3>
                <p>Choose a game mode and join a room, or create your own.</p>

                <div class="rooms-container" id="rooms-list">
                </div>
                <!-- Action Buttons -->
                <div class="rooms-actions">

                    <!-- Quickplay Dropdown (left) -->
                    <div class="rooms-action-side">
                        <div class="rooms-dropdown">
                            <button class="rooms-btn rooms-dropdown-btn" onclick="toggleDropdown()"> Quickplay ⏷ </button>
                            <div class="rooms-dropdown-menu" id="quickplayMenu">
                                <a href="#">Casual</a>
                                <a href="#">Time Attack</a>
                                <a href="#">1st 2 3</a>
                            </div>
                        </div>
                    </div>

                    <!-- Create Room (center) -->
                    <div class="rooms-action-center">
                        <a href="roombase.html" class="rooms-btn rooms-create-btn">Create Room</a>
                    </div>

                    <!-- Join by Code (right) -->
                    <div class="rooms-action-side">
                        <input type="text" class="rooms-code-input" placeholder="Room Code (#XYZ-123)">
                        <a href="#" class="rooms-btn rooms-join-btn">Join</a>
                    </div>

                </div>

                <script>
                    function toggleDropdown() {
                        document.getElementById('quickplayMenu').classList.toggle('show');
                    }
                </script>
            </main>
        <footer class="foot">Universidade da Madeira 2025-2026</footer>
    </div>
    
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="../public/js/rooms.js"></script>
</body>
</html>
