<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="../public/css/ourStyle.css" rel="stylesheet">
    <title>MATRIOSCA</title>
</head>
<body class="d-flex flex-column min-vh-100">
    <header class="ls-header text-center"><a href="index.html">MATRIOSCA</a></header>

    <main class="container flex-grow-1 d-flex align-items-center justify-content-center pt-5 pb-4">
        <div class="row w-100 justify-content-center">
        <div class="col-12 col-sm-10 col-md-8 col-lg-5 col-xl-4">
        <div class="ls-card mx-auto">
            <p> Welcome! </p>
            <h3 style ="margin-bottom: 5px;" > Create ur account </h3>
            <p> Register to start playing! </p>

            <form action="/signup" method="POST">
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" name="username" required>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" name="email" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password" required>
                </div>
                <div class="mb-3">
                    <label for="confirmPassword" class="form-label">Confirm Password</label>
                    <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" required>
                </div>
                <button type="submit" class="ls-button">Sign Up</button>

            </form>

            <p style="text-align: center; margin-top: 20px; margin-bottom: 0px;">Already have an account? <a href="login.html">Log in</a>.</p>

            </div>
            </div>
            </div>
            </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="../public/js/signup.js"></script>
</body>
</html>
