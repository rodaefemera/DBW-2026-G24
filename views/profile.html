<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="../public/css/ourStyle.css" rel="stylesheet">
    <title>MATRIOSCA</title>
</head>

<body>
    <div class="container">
            <!-- Header -->
            <header>
                <div class="top">
                    <a href="index.html" class="bigword">MATRIOSCA</a>
                    <a href="login.html" class="authentication">Log In</a>
                    <a href="signup.html" class="authentication">Sign up</a>
                </div>
                <nav class="navegacao">
                    <a href="profile.html">Profile</a>
                    <a href="friends.html">Friends</a>
                    <a href="roomlist.html">Rooms</a>
                    <a href="leaderboards.html">Leaderboard</a>
                    <a href="feedback.html">Feedback</a>
                </nav>
            </header>

            <!-- Center -->
            <main class="page-main whitebg">
                <div class="profile-split">

                    <!-- Left Panel (35%) -->
                    <div class="profile-left">
                        <h2 class="profile-title">Profile</h2>

                        <img src="" class="profile-avatar" id="profileIcon" alt="Avatar" style="object-fit: cover;">
                        <p class="profile-username" id="profileName"><span class="profile-edit-icon">✎</span></p>
                    </div>

                    <!-- Right Panel (65%) -->
                    <div class="profile-right">
                        <h2 class="profile-pb-title">Personal Best</h2>

                        <div class="profile-pb-list">
                            <div class="profile-pb-item">
                                <span class="profile-pb-mode">Casual:</span>
                                <span class="profile-pb-score" id="scoreCasual"></span>
                            </div>

                            <div class="profile-pb-item">
                                <span class="profile-pb-mode">Time Attack:</span>
                                <span class="profile-pb-score" id="scoreTimeAttack"></span>
                            </div>

                            <div class="profile-pb-item">
                                <span class="profile-pb-mode">1st 2 3:</span>
                                <span class="profile-pb-score" id="scoreFirst23"></span>
                            </div>
                        </div>
                    </div>

                </div>
            </main>
        <footer class="foot">Universidade da Madeira 2025-2026</footer>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="../public/js/profile.js"></script>
</body>

</html>
